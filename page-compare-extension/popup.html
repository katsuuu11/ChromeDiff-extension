<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 400px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    h2 {
      margin: 0 0 16px 0;
      font-size: 16px;
      font-weight: 600;
    }
    .input-group {
      margin-bottom: 12px;
    }
    .input-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #555;
    }
    .fill-current {
      border: 1px solid #ddd;
      background: #fff;
      color: #444;
      border-radius: 4px;
      font-size: 11px;
      padding: 4px 8px;
      cursor: pointer;
      margin: 0;
      width: auto;
    }
    .fill-current:hover {
      background: #f5f5f5;
    }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #4285f4;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #4285f4;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
    }
    button:hover {
      background: #357ae8;
    }
    button:active {
      background: #2a5dc7;
    }
    .note {
      font-size: 11px;
      color: #666;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>
  <h2>ReleaseDiff</h2>

  <div class="input-group">
    <div class="input-header">
      <label for="url1">Production URL (本番環境)</label>
      <button type="button" class="fill-current" id="fillUrl1">現在のタブを反映</button>
    </div>
    <input type="text" id="url1" placeholder="https://www.example.com/page">
  </div>

  <div class="input-group">
    <div class="input-header">
      <label for="url2">Staging URL (ステージング環境)</label>
      <button type="button" class="fill-current" id="fillUrl2">現在のタブを反映</button>
    </div>
    <input type="text" id="url2" placeholder="https://staging.example.com/page">
  </div>

  <button id="openCompare">Check Diff</button>

  <div class="note">
    ステージング環境と本番環境を重ねて表示します。<br>
    入力中のURLは自動保存されるので、タブ移動しても消えません。
  </div>

  <script src="popup.js"></script>
</body>
</html>
