<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Live Compare</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111; color: #fff; }
    #controls {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.88);
      color: #fff;
      padding: 10px 14px;
      z-index: 10000;
      display: flex;
      gap: 16px;
      align-items: center;
      font-size: 12px;
    }
    .control-group { display: flex; align-items: center; gap: 6px; }
    input[type="range"] { width: 120px; }
    button {
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 4px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      padding: 4px 8px;
      cursor: pointer;
    }
    #status {
      margin-left: auto;
      opacity: 0.8;
    }
    #container {
      position: fixed;
      top: 44px;
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
      background: #000;
      cursor: ns-resize;
    }
    #video1, #video2 {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      transform-origin: top left;
      background: #000;
    }
    #video2 {
      opacity: 0.5;
      mix-blend-mode: difference;
    }
  </style>
</head>
<body>
  <div id="controls">
    <div class="control-group">
      <label for="opacity">Opacity</label>
      <input type="range" id="opacity" min="0" max="100" value="50">
      <span id="opacityValue">50%</span>
    </div>
    <div class="control-group">
      <label for="offsetX">X</label>
      <input type="range" id="offsetX" min="-500" max="500" value="0">
      <span id="offsetXValue">0</span>
    </div>
    <div class="control-group">
      <label for="offsetY">Y</label>
      <input type="range" id="offsetY" min="-500" max="500" value="0">
      <span id="offsetYValue">0</span>
    </div>
    <button id="blendToggle" type="button">Difference</button>
    <button id="focusTab1" type="button">Focus Prod</button>
    <button id="focusTab2" type="button">Focus Stage</button>
    <span id="status"></span>
  </div>

  <div id="container">
    <video id="video1" autoplay muted playsinline></video>
    <video id="video2" autoplay muted playsinline></video>
  </div>

  <script src="live-overlay.js"></script>
</body>
</html>
