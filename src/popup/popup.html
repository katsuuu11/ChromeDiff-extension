<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chrome Diff Pair</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main>
    <h1>Chrome Diff Pair</h1>

    <section id="newSessionSection">
      <label>
        Staging URL
        <input id="stagingUrl" placeholder="https://stg.example.com/path" />
      </label>
      <div class="assistRow">
        <button id="useCurrentAsStgBtn" class="subtle" type="button">Use current tab as STG</button>
        <button id="generateProdBtn" class="subtle" type="button">Generate paired URL</button>
      </div>

      <label>
        Production URL
        <input id="productionUrl" placeholder="https://www.example.com/path" />
      </label>
      <div class="assistRow">
        <button id="useCurrentAsProdBtn" class="subtle" type="button">Use current tab as PROD</button>
        <button id="generateStgBtn" class="subtle" type="button">Generate paired URL</button>
      </div>

      <div id="recentPairsSection" class="hidden">
        <p class="caption">Recent pairs</p>
        <div id="recentPairsList" class="recentList"></div>
      </div>

      <button id="startBtn">Start Compare</button>
    </section>

    <section id="activeSessionSection" class="hidden">
      <p id="sessionMeta"></p>
      <div class="row">
        <button id="resumeBtn">Resume Session</button>
        <button id="restartBtn">Restart Session</button>
        <button id="reopenBtn">Reopen Missing Side</button>
      </div>
      <div class="row">
        <label><input type="checkbox" id="scrollSyncToggle" checked /> Scroll Sync</label>
        <label><input type="checkbox" id="urlSyncToggle" checked /> URL Sync</label>
      </div>
      <button id="endBtn" class="danger">End Session</button>
    </section>

    <p id="message" aria-live="polite"></p>
  </main>
  <script type="module" src="popup.js"></script>
</body>
</html>
