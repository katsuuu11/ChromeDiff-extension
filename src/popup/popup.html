<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chrome Diff Pair</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main>
    <h1>Chrome Diff Pair</h1>

    <section id="newSessionSection">
      <label>
        ステージングURL
        <input id="stagingUrl" placeholder="https://stg.example.com/path" />
      </label>
      <div class="assistRow">
        <button id="useCurrentAsStgBtn" class="subtle" type="button">今のタブをステージングに入れる</button>
      </div>

      <label>
        本番URL
        <input id="productionUrl" placeholder="https://www.example.com/path" />
      </label>
      <div class="assistRow">
        <button id="useCurrentAsProdBtn" class="subtle" type="button">今のタブを本番に入れる</button>
      </div>

      <button id="startBtn">比較を開始</button>
    </section>

    <section id="activeSessionSection" class="hidden">
      <p id="sessionMeta"></p>
      <div class="row">
        <button id="resumeBtn">再開</button>
        <button id="restartBtn">やり直す</button>
      </div>
      <div class="row">
        <label><input type="checkbox" id="scrollSyncToggle" checked /> スクロール同期</label>
        <label><input type="checkbox" id="urlSyncToggle" checked /> URL同期</label>
      </div>
      <button id="endBtn" class="danger">終了</button>
    </section>

    <p id="message" aria-live="polite"></p>
  </main>
  <script type="module" src="popup.js"></script>
</body>
</html>
